<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lỗi</title>
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#ffffff;
  --bg-sidebar:#f8fafd;
  --border:#e8eaed;
  --border-strong:#dadce0;
  --text-primary:#3c4043;
  --text-secondary:#5f6368;
  --text-tertiary:#80868b;
  --blue:#1a73e8;
  --blue-hover:#1765cc;
  --shadow-1:0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
  --font-display:'Google Sans','Roboto',Arial,sans-serif;
  --font-body:'Roboto',Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg-sidebar);
  color:var(--text-primary);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.error-wrap{
  text-align:center;
  padding:24px;
}
.error-code{
  font-family:var(--font-display);
  font-size:5.5rem;
  font-weight:700;
  color:var(--border-strong);
  line-height:1;
  margin-bottom:20px;
}
.error-title{
  font-family:var(--font-display);
  font-size:1.375rem;
  font-weight:500;
  color:var(--text-primary);
  margin:0 0 8px;
}
.error-message{
  font-size:.9rem;
  color:var(--text-secondary);
  margin:0 0 32px;
}
.btn-home{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  padding:11px 24px;
  border-radius:24px;
  font-size:.9rem;
  font-weight:500;
  box-shadow:var(--shadow-1);
  transition:background .15s, box-shadow .15s;
}
.btn-home:hover{background:var(--blue-hover);box-shadow:0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15)}
</style>
</head>
<body>
<div class="error-wrap">
  <div class="error-code">404</div>
  <h1 class="error-title">{{ .title }}</h1>
  <p class="error-message">{{ .message }}</p>
  <a href="/" class="btn-home"><i class="fa fa-house"></i> Về trang chủ</a>
</div>
</body>
</html>
