<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiết lập StreamAPI</title>
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#ffffff;
  --bg-sidebar:#f8fafd;
  --border:#e8eaed;
  --border-strong:#dadce0;
  --text-primary:#3c4043;
  --text-secondary:#5f6368;
  --text-tertiary:#80868b;
  --blue:#1a73e8;
  --blue-hover:#1765cc;
  --blue-light:#e8f0fe;
  --red:#d93025;
  --red-bg:#fce8e6;
  --shadow-1:0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
  --shadow-2:0 1px 3px 0 rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15);
  --font-display:'Google Sans','Roboto',Arial,sans-serif;
  --font-body:'Roboto',Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg-sidebar);
  color:var(--text-primary);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
  padding:16px;
}
.auth-wrap{width:100%;max-width:400px}
.auth-brand{text-align:center;margin-bottom:28px}
.auth-brand i{font-size:2.75rem;color:var(--blue);margin-bottom:10px;display:block}
.auth-brand h1{
  font-family:var(--font-display);
  font-size:1.5rem;
  font-weight:500;
  color:var(--text-primary);
  margin:0;
}
.auth-brand p{font-size:.85rem;color:var(--text-secondary);margin:6px 0 0}

.auth-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  padding:36px 32px;
  box-shadow:var(--shadow-2);
}

.info-box{
  display:flex;
  align-items:flex-start;
  gap:12px;
  background:var(--blue-light);
  border:1px solid #c6dafc;
  border-radius:8px;
  padding:14px 16px;
  margin-bottom:24px;
}
.info-box i{color:var(--blue);margin-top:2px}
.info-box p{font-size:.85rem;color:#1967d2;margin:0;line-height:1.4}

.error-box{
  background:var(--red-bg);
  border:1px solid #f6c7c3;
  color:var(--red);
  font-size:.85rem;
  border-radius:8px;
  padding:11px 14px;
  margin-bottom:16px;
}

.field{margin-bottom:16px}
.field label{
  font-size:.75rem;
  color:var(--text-secondary);
  display:block;
  margin-bottom:6px;
}
.field input{
  width:100%;
  background:#fff;
  border:1px solid var(--border-strong);
  border-radius:6px;
  padding:11px 14px;
  font-size:.9rem;
  color:var(--text-primary);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
.field input::placeholder{color:var(--text-tertiary)}

.btn-submit{
  width:100%;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:24px;
  padding:12px;
  font-size:.9rem;
  font-weight:500;
  cursor:pointer;
  transition:background .15s;
}
.btn-submit:hover{background:var(--blue-hover)}
.btn-submit:disabled{opacity:.6;cursor:default}
.hidden{display:none !important}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-brand">
    <i class="fa-brands fa-telegram"></i>
    <h1>StreamAPI</h1>
    <p>Thiết lập lần đầu</p>
  </div>

  <div class="auth-card">
    <div class="info-box">
      <i class="fa fa-circle-info"></i>
      <p>Tạo tài khoản quản trị viên để bắt đầu sử dụng StreamAPI.</p>
    </div>

    <div id="errorMsg" class="error-box hidden"></div>

    <div class="field">
      <label>Tên đăng nhập</label>
      <input id="username" type="text" placeholder="admin" autofocus>
    </div>
    <div class="field" style="margin-bottom:24px">
      <label>Mật khẩu (ít nhất 6 ký tự)</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>
    <button onclick="setup()" id="setupBtn" class="btn-submit">Tạo tài khoản Admin</button>
  </div>
</div>

<script>
async function setup() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('setupBtn');
  const errEl = document.getElementById('errorMsg');

  btn.disabled = true;
  errEl.classList.add('hidden');

  try {
    const form = new FormData();
    form.append('username', username);
    form.append('password', password);

    const res = await fetch('/setup', { method: 'POST', body: form });
    const data = await res.json();

    if (res.ok) {
      window.location.href = '/login';
    } else {
      errEl.textContent = data.error || 'Lỗi tạo tài khoản';
      errEl.classList.remove('hidden');
    }
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
