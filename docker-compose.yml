version: '3.8'

services:
  telecloud:
    build: .
    container_name: telecloud
    restart: unless-stopped
    ports:
      - "${PORT:-8091}:8091"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/telecloud.db
      - THUMBS_DIR=/app/data/thumbs
      - TEMP_DIR=/app/data/temp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/login"]
      interval: 30s
      timeout: 10s
      retries: 3
